services:
  mongo:
    image: mongo:latest
    container_name: greentrade-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - greentrade-network
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: |
        mongosh --eval "
        try {
          var status = rs.status();
          print('Replica set is running');
        } catch (err) {
          print('Initializing replica set...');
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'localhost:27017' }]
          });
        }
        " --quiet
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local

networks:
  greentrade-network:
    driver: bridge