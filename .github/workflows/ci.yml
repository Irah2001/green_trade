name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install
        run: pnpm install
      - name: Lint
        run: pnpm -w -r lint || true
      - name: Run tests
        run: pnpm -w -r test || true