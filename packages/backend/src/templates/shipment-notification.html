<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expédition en cours</title>
    <style>
      body { font-family: Arial, sans-serif; color: #1f2937; }
      .container { max-width: 600px; margin: 0 auto; padding: 24px; }
      .brand { color: #22c55e; font-weight: 700; font-size: 18px; }
      .card { border: 1px solid #e5e7eb; padding: 16px; border-radius: 8px; }
      .muted { color: #6b7280; font-size: 14px; }
      .strong { font-weight: 600; }
      a.button { display:inline-block; background:#22c55e; color:#fff; padding:10px 14px; text-decoration:none; border-radius:6px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="brand">GreenTrade</div>
      <h2>Votre commande a été expédiée</h2>
      <div class="card">
        <p>Bonjour <span class="strong">[Prénom]</span>,</p>
        <p class="muted">La commande contenant <span class="strong">[ProductName]</span> (quantité : <span class="strong">[Quantity]</span>) a été expédiée.</p>
        <p>
          Numéro de suivi : <span class="strong">[TrackingNumber]</span><br/>
          Transporteur : <span class="strong">[Carrier]</span>
        </p>
        <p>
          <a class="button" href="[TrackingUrl]">Suivre le colis</a>
        </p>
        <p class="muted">Expédié le : [ShippedAt]</p>
        <p>Merci d'utiliser GreenTrade.</p>
      </div>
    </div>
  </body>
</html>
